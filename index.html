<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coinawe Escrow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glow-button {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease-in-out;
    }
    .glow-button::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
      transform: rotate(25deg);
      transition: all 0.4s ease;
      opacity: 0;
    }
    .glow-button:hover::after {
      opacity: 1;
      animation: shine 1s ease;
    }
    @keyframes shine {
      0% { transform: translate(-50%,-50%) rotate(25deg); }
      100% { transform: translate(150%,150%) rotate(25deg); }
    }
  </style>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center h-screen text-center">
  <div class="max-w-lg">
    <h1 class="text-4xl font-bold text-sky-400 mb-4">🚀 Coinawe Escrow</h1>
    <p class="text-slate-300 mb-8">
      Coinawe is a Telegram-based escrow platform powered by the 
      <span class="text-emerald-400 font-semibold">AWEWE</span> utility token, 
      offering secure, fast, and KYC-free transactions.
    </p>
    <div class="flex flex-col gap-4">
      <a href="https://escrow.coinawe.site" class="glow-button bg-sky-600 hover:bg-sky-700 px-6 py-3 rounded-xl font-semibold shadow-lg">➕ Create Escrow</a>
      <a href="whitepaper.html" class="glow-button bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-xl font-semibold shadow-lg">📜 View History</a>
      <a href="https://t.me/coinawe" target="_blank" class="glow-button bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-xl font-semibold shadow-lg">💬 Join Telegram</a>
    </div>
  </div>
  <footer class="absolute bottom-4 text-slate-500 text-sm">&copy; 2025 COINAWE. All rights reserved.</footer>
</body>
</html>
