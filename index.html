<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coinawe – Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      color: #38bdf8;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      color: #94a3b8;
      max-width: 500px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 2rem;
      color: #38bdf8;
    }
    .telegram-link {
      margin-top: 2rem;
      display: inline-block;
      background-color: #2ecc71;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="logo">Coinawe</div>
  <h1>🚧 Website Under Maintenance</h1>
  <p>We are currently improving our platform to serve you better. Please check back soon!</p>
  <a href="https://t.me/coinawe" target="_blank" class="telegram-link">Join our Telegram for updates</a>

  <script>
    // Disable right-click
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    // Block F12, Ctrl+Shift+I, Ctrl+U, Ctrl+Shift+C
    document.addEventListener('keydown', function(e) {
      if (
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && ['I', 'i', 'C', 'c', 'J', 'j'].includes(e.key)) ||
        (e.ctrlKey && ['U', 'u'].includes(e.key))
      ) {
        e.preventDefault();
      }
    });

    // Extra: Detect if DevTools is open
    setInterval(() => {
      const devtools = window.outerWidth - window.innerWidth > 160;
      if (devtools) {
        document.body.innerHTML = '<h1 style="color: red;">⚠️ Developer tools are disabled on this site.</h1>';
      }
    }, 1000);
  </script>
</body>
</html>
